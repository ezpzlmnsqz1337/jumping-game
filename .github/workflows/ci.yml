name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install root dependencies
        run: npm install

      - name: Install server dependencies
        run: |
          cd multiplayer-server
          npm install

      - name: Lint root (TypeScript)
        run: npm run lint

      - name: Lint server (TypeScript)
        run: |
          cd multiplayer-server
          npm run lint

  format:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install root dependencies
        run: npm install

      - name: Install server dependencies
        run: |
          cd multiplayer-server
          npm install

      - name: Check formatting (root)
        run: npm run format:check

      - name: Check formatting (server)
        run: |
          cd multiplayer-server
          npm run format:check

  build:
    needs: [lint, format]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install root dependencies
        run: npm install

      - name: Install server dependencies
        run: |
          cd multiplayer-server
          npm install

      - name: Build client
        run: npm run build

      - name: Build server
        run: |
          cd multiplayer-server
          npm run build

  test:
    needs: [lint, format]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install root dependencies
        run: npm install

      - name: Run UI tests
        run: npm run test:ui

      - name: Install server dependencies
        run: |
          cd multiplayer-server
          npm install

      - name: Run server tests
        run: |
          cd multiplayer-server
          npm test
