<div class="mobile-controls" role="toolbar" aria-label="Game controls">
  <!-- D-pad (left side) -->
  <div class="controls-dpad" role="group" aria-label="Movement">
    <div class="controls-dpad-row">
      <button id="btn-forward" class="controls-btn controls-btn-dpad" aria-label="Move forward" tabindex="-1">&#9650;</button>
    </div>
    <div class="controls-dpad-row">
      <button id="btn-left" class="controls-btn controls-btn-dpad" aria-label="Move left" tabindex="-1">&#9668;</button>
      <button id="btn-back" class="controls-btn controls-btn-dpad" aria-label="Move backward" tabindex="-1">&#9660;</button>
      <button id="btn-right" class="controls-btn controls-btn-dpad" aria-label="Move right" tabindex="-1">&#9658;</button>
    </div>
  </div>

  <!-- Action buttons (right side) -->
  <div class="controls-actions" role="group" aria-label="Actions">
    <div class="controls-actions-row">
      <button id="btn-turn-left" class="controls-btn controls-btn-action" aria-label="Turn left" tabindex="-1">&#9664; Turn</button>
      <button id="btn-turn-right" class="controls-btn controls-btn-action" aria-label="Turn right" tabindex="-1">Turn &#9654;</button>
    </div>
    <div class="controls-actions-row">
      <button id="btn-jump" class="controls-btn controls-btn-action controls-btn-jump" aria-label="Jump" tabindex="-1">Jump</button>
    </div>
    <div class="controls-actions-row">
      <button id="btn-respawn" class="controls-btn controls-btn-utility" aria-label="Respawn" tabindex="-1">R</button>
      <button id="btn-chat" class="controls-btn controls-btn-utility" aria-label="Open chat" tabindex="-1">Chat</button>
      <button id="btn-toggle-hud" class="controls-btn controls-btn-utility" aria-label="Toggle HUD" tabindex="-1">HUD</button>
      <button id="btn-fullscreen" class="controls-btn controls-btn-utility" aria-label="Toggle fullscreen" tabindex="-1">&#9974;</button>
      <button id="btn-lobby" class="controls-btn controls-btn-utility" aria-label="Open lobby" tabindex="-1">Lobby</button>
    </div>
  </div>
</div>
