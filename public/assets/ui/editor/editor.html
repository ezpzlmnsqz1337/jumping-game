<div class="editor" style="display: none">
  <div class="edit-mode">
    <div class="heading">
      <div>Editor</div>
    </div>
    <div>
      <span>Level source</span>
      <span class="level-source">hardcoded</span>
    </div>
    <div>
      <span>Level summary</span>
      <span class="level-summary">default</span>
    </div>
    <div>
      <label for="edit-mode-enabled">Edit mode</label>
      <input type="checkbox" class="edit-mode-enabled" />
    </div>
    <div>
      <span>Export level</span>
      <button type="button" class="export-level">Download JSON</button>
    </div>
    <div>
      <span>Import level</span>
      <button type="button" class="import-level">Load JSON</button>
      <input type="file" class="import-level-input" accept="application/json,.json" />
    </div>
    <div>
      <span>Reset import</span>
      <button type="button" class="clear-level-import">Use hardcoded level</button>
    </div>
  </div>
  <div class="editor-controls">
    <div class="heading">
      <div>Mesh info</div>
    </div>
    <div class="mesh-name"></div>
    <div>
      <label for="transform-enabled">Transform</label>
      <div>
        <span class="transform-value">[0, 0, 0]</span>
        <input type="checkbox" class="transform-enabled" />
      </div>
    </div>
    <div>
      <label for="scaling-enabled">Scaling</label>
      <div>
        <span class="scaling-value">[0, 0, 0]</span>
        <input type="checkbox" class="scaling-enabled" />
      </div>
    </div>
    <div>
      <label for="rotation-enabled">Rotation</label>
      <div>
        <span class="rotation-value">[0, 0, 0]</span>
        <input type="checkbox" class="rotation-enabled" />
      </div>
    </div>
    <div class="mesh-details-block">
      <div><label>Type</label><div><span class="detail-mesh-type">-</span></div></div>
      <div><label>Name</label><div><span class="detail-mesh-name">-</span></div></div>
      <div><label>Id</label><div><span class="detail-mesh-id">-</span></div></div>
      <div><label>Position</label><div><span class="detail-position">-</span></div></div>
      <div><label>Rotation</label><div><span class="detail-rotation">-</span></div></div>
      <div><label>Scaling</label><div><span class="detail-scaling">-</span></div></div>
      <div><label>Bounds</label><div><span class="detail-bounds">-</span></div></div>
      <div><label>Visible</label><div><span class="detail-visible">-</span></div></div>
      <div><label>Collisions</label><div><span class="detail-collisions">-</span></div></div>

      <div class="heading-small">Material</div>
      <div><label>Alpha</label><div><span class="detail-material-alpha">-</span></div></div>
      <div><label>Roughness</label><div><span class="detail-material-roughness">-</span></div></div>
      <div><label>Texture</label><div><span class="detail-material-texture">-</span></div></div>

      <div class="heading-small">Physics</div>
      <div><label>Mode</label><div><span class="detail-physics-mode">-</span></div></div>
      <div><label>Shape</label><div><span class="detail-physics-shape">-</span></div></div>
      <div><label>Mass</label><div><span class="detail-physics-mass">-</span></div></div>
      <div><label>Friction</label><div><span class="detail-physics-friction">-</span></div></div>
      <div><label>Restitution</label><div><span class="detail-physics-restitution">-</span></div></div>

      <div class="heading-small trigger-heading">Trigger</div>
      <div><label>Trigger type</label><div><span class="detail-trigger-type">-</span></div></div>
      <div><label>Debug type</label><div><span class="detail-trigger-debug">-</span></div></div>
      <div><label>Camera target</label><div><span class="detail-trigger-camera">-</span></div></div>
    </div>
    <div class="camera">
      <div class="heading">Camera</div>
      <div class="camera-position">
        <span>Position</span>
        <span class="value">[0, 0, 0]</span>
      </div>
      <div class="camera-alpha">
        <span>Alpha</span>
        <span class="value">0</span>
      </div>
      <div class="camera-beta">
        <span>Beta</span>
        <span class="value">0</span>
      </div>
      <div class="camera-radius">
        <span>Radius</span>
        <span class="value">0</span>
      </div>
      <div class="lock-target">
        <label for="lock-target-enabled">Lock target</label>
        <input type="checkbox" class="lock-target-enabled"></input>
      </div>
    </div>
  </div>
</div>
