<div class="ui-buttons">
  <div class="settings">🛠</div>
</div>
<div class="lobby-wrapper" style="display: none">
  <div class="lobby">
    <div class="lm-views">
      <!-- Play View -->
      <div class="lm-view active" data-view="play">
        <h2>Select Level</h2>
        <div class="level-select">
          <div class="level-list"></div>
        </div>
        <div class="dev-only">
          <h3>Level Editor</h3>
          <div class="editor-actions">
            <input type="text" class="new-level-name" placeholder="My Custom Level" />
            <button class="create-level-btn">Create from template</button>
            <button class="import-level-btn">Import JSON</button>
            <input type="file" class="import-level-input" accept=".json" style="display: none" />
          </div>
          <div class="stored-levels">
            <h4>Stored Levels</h4>
            <div class="stored-level-list"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Player Setup (always visible at bottom) -->
    <div class="player-setup">
      <div class="nickname">
        <label>Nickname</label>
        <input type="text" class="nickname-input" maxlength="15" />
        <span class="error" style="display: none">Nickname cannot be empty!</span>
      </div>
      <div class="player-color">
        <label>Color</label>
        <div class="colors">
          <div class="blue"></div>
          <div class="green"></div>
          <div class="orange"></div>
          <div class="pink"></div>
          <div class="red"></div>
          <div class="purple"></div>
          <div class="yellow"></div>
        </div>
      </div>
      <button class="play-btn">Play</button>
    </div>
  </div>
</div>
