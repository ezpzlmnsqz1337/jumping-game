<div class="game-settings">
  <div class="settings-note">Tip: press <strong>L</strong> for lobby and <strong>T</strong> for chat.</div>
  <div class="quality-setting">
    <label for="quality-tier">Quality</label>
    <select class="quality-tier">
      <option value="auto">Auto</option>
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>
  </div>
  <div class="automatic-camera" >
    <label for="automatic-camera-enabled">Auto camera</label>
    <input type="checkbox" class="automatic-camera-enabled"></input>
  </div>
  <div class="followCamera">
    <label for="follow-camera-enabled">Follow camera</label>
    <input type="checkbox" class="follow-camera-enabled"></input>
  </div>
  <div class="collissions">
    <label for="collissions-enabled">Collisions</label>
    <input type="checkbox" class="collissions-enabled"></input>
  </div>
  <div class="player-info-visibility">
    <label for="player-info-enabled">Player info</label>
    <input type="checkbox" class="player-info-enabled"></input>
  </div>
  <div class="edit-mode-visibility">
    <label for="edit-mode-enabled-global">Edit mode</label>
    <input type="checkbox" class="edit-mode-enabled-global"></input>
  </div>
</div>
